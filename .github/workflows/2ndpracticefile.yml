name: 2ndpractice github
on: 
 pull_request:
  types:
  - opened
 push:
  branches:
   - main
jobs:
 test_expression:
  runs-on: ubuntu-latest
  outputs: 
   my-value: ${{steps.echo-value.outputs.script}}
  steps:
   - name: checkout code
     uses: actions/checkout@v4
   - name: log expression
     run: echo "${{ toJSON(github.event) }}"
   - name: print message
     run: echo "hello world"
   - name: output test
     id: echo-value
     run: echo "script=src.js" >> "$GITHUB_OUTPUT"
   - name: install dependencies
     run: cd ecomm-react-app && npm install
   - name: build Project
     run: cd ecomm-react-app && npm run build
   - name: upload articraft
     uses: actions/upload-artifact@v4
     with:
      name: React-buil-artifact
      path: ecomm-react-app/dist/
 deploy:
  needs: test_expression
  runs-on: ubuntu-latest
  steps:
   - name: reading output
     run: echo "${{ needs.test_expression.outputs.my-value}}"
   - name: download-artifact
     uses: actions/download-artifact@v4
     with:
      name: React-buil-artifact
      path: ecomm-react-app/artifacts
  
    
